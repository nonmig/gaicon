    function switchTab(tab, el) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');

      document.getElementById('nameidSection').classList.toggle('hidden', tab !== 'nameid');
      document.getElementById('cardlistSection').classList.toggle('hidden', tab !== 'cardlist');

    function cleanInput(text) {
      if (!text) return '';
      text = text.replace(/\s*x\s*\d+/gi, '');
      text = text.replace(/_PERIOD\d+/gi, '');
      text = text.replace(/:\d+/g, '');
      text = text.replace(/\b\d+\s*(d|day|days)\b/gi, '');
      return text.trim();
    }

    function parseModifiers(rawLine) {
      const lower = rawLine.toLowerCase();

      let quantity = null;
      const matchX = lower.match(/x\s*(\d+)/i);
      if (matchX) {
        quantity = parseInt(matchX[1], 10);
      } else {
        const endNum = lower.match(/(\d+)\s*$/);
        if (endNum && !lower.match(/(\d+)\s*(d|day|days)\s*$/i)) {
          quantity = parseInt(endNum[1], 10);
        }
      }

      let period = null;
      const matchDay = lower.match(/(\d+)\s*(d|day|days)/i);
      if (matchDay) {
        period = parseInt(matchDay[1], 10);
      }

      return { quantity, period };
    }

    function buildFinalId(baseId, mods) {
      let out = baseId;
      if (mods.period) out += `_PERIOD${mods.period}`;
      if (mods.quantity) out += `:${mods.quantity}`;
      return out;
    }

      id = `${amount}gm`;
      name = `${amount}G`;
    } else if (type === "a" || type === "rm") {
      id = `${amount}rm`;
      name = `${amount}A`;
    }

    return {
      idname: id,
      name: name
    };
  }

  const cleanedQuery = cleanInput(query.toLowerCase());

  return dataList.find(item => {
    const idClean = cleanInput((item.idname || '').toLowerCase());
    const nameClean = cleanInput((item.name || '').toLowerCase());
    return idClean === cleanedQuery || nameClean === cleanedQuery;
  }) || null;
}

    function renderResults() {
      results.innerHTML = '';
      outputArea.value = '';
      notFoundBox.style.display = 'none';
      notFoundBox.textContent = '';
      copyBtn.disabled = true;

      const lines = inputArea.value
        .split('\n')
        .map(line => line.trim())
        .filter(Boolean);

      if (!lines.length) return;

      const outputLines = [];
      const notFound = [];

      lines.forEach(rawLine => {
        const found = findItem(rawLine);
        const mods = parseModifiers(rawLine);

        if (!found) {
          notFound.push(rawLine);
          return;
        }

        const finalId = buildFinalId(found.idname, mods);
        if (outputMode === "id") {
  outputLines.push(finalId);
} else {
  outputLines.push(found.name);
}

        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-title">${escapeHtml(found.name)}</div>
          <div class="item-line"><span class="badge">ID</span>${escapeHtml(found.idname)}</div>
          <div class="item-line"><span class="badge">Final</span>${escapeHtml(finalId)}</div>
        `;
        results.appendChild(card);
      });

      if (outputLines.length) {
        outputArea.value = outputLines.join('\n');
        copyBtn.disabled = false;
      }

      if (notFound.length) {
        notFoundBox.textContent = 'Not found:\n- ' + notFound.join('\n- ');
        notFoundBox.style.display = 'block';
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function debounce(fn, delay) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    const debouncedRender = debounce(renderResults, 200);
    inputArea.addEventListener('input', debouncedRender);

    function copyOutput() {
      if (!outputArea.value) return;
      navigator.clipboard.writeText(outputArea.value).then(() => {
        copyStatus.style.display = 'inline';
        const oldText = copyBtn.textContent;
        copyBtn.textContent = '✅ Copied!';
        setTimeout(() => {
          copyBtn.textContent = oldText;
          copyStatus.style.display = 'none';
        }, 1400);
      });
    }

    function clearAll() {
      inputArea.value = '';
      outputArea.value = '';
      results.innerHTML = '';
      notFoundBox.style.display = 'none';
      notFoundBox.textContent = '';
      copyBtn.disabled = true;
      copyStatus.style.display = 'none';
    }

    function setReadyStatus(message) {
      loadStatus.textContent = message;
      inputArea.disabled = false;
    }

    function extractIconName(texPath) {
      if (!texPath) return null;
      const regex = /\/([^\/]+)\.tex$/;
      const match = texPath.match(regex);
      return match ? match[1] : null;
    }
	
	function setupData(data) {
  dataList = data
    .filter(item => item.idname && item.name)
    .map(item => ({
      idname: String(item.idname),
      name: String(item.name),
      tex: item.tex ? String(item.tex) : ''
    }));

  finalGalleryData = targetCardIDs.map(targetId => {
    const foundItem = data.find(item =>
      item.idname && item.idname.toLowerCase() === targetId.toLowerCase()
    );

    if (foundItem) {
      return {
        id: String(foundItem.idname),
        name: String(foundItem.name),
        icon: extractIconName(foundItem.tex) || String(foundItem.idname)
      };
    }

    return {
      id: targetId,
      name: targetId.replace(/_/g, ' ').toUpperCase(),
      icon: targetId
    };
  });

  inputArea.disabled = false;
  searchInput.disabled = false;

outputMode = "id";   // 👈 บังคับ default
renderResults();
renderGallery();
}

    function renderGallery(filterText = '') {
      const gallery = document.getElementById('cardGallery');
      gallery.innerHTML = '';

      const filteredCards = finalGalleryData.filter(item =>
        item.id.toLowerCase().includes(filterText.toLowerCase()) ||
        item.name.toLowerCase().includes(filterText.toLowerCase())
      );

      filteredCards.forEach(item => {
        const cardDiv = document.createElement('div');
        cardDiv.className = 'card-item';

        const safeId = String(item.id).replace(/\\/g, '\\\\').replace(/'/g, "\\'");

        cardDiv.innerHTML = `
          <div class="icon-container">
            <img
  src="${iconNameToGithubUrl(item.icon)}"
  class="card-img"
  alt="Icon"
  loading="lazy"
  onerror="this.src=''; this.alt='ไม่มีรูปภาพ';"
>
          </div>

          <div class="info-box">
            <div class="card-name">${escapeHtml(item.name)}</div>
            <div class="card-id">${escapeHtml(item.id)}</div>
          </div>

          <button class="copy-btn" onclick="copyToClipboard(this, '${safeId}')">📋 Copy ID</button>
        `;
        gallery.appendChild(cardDiv);
      });
    }

    function filterCards() {
      renderGallery(searchInput.value);
    }

    function copyToClipboard(button, text) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = button.innerHTML;
        button.innerHTML = "✅ คัดลอกแล้ว!";
        button.classList.add("copied");
        setTimeout(() => {
          button.innerHTML = originalText;
          button.classList.remove("copied");
        }, 1500);
      });
    }

   function loadDataFromAPI(forceRefresh = false) {
  loadStatus.textContent = 'กำลังโหลดฐานข้อมูล...';
  cardLoadStatus.textContent = '⏳ กำลังโหลดรายชื่อการ์ด...';
  inputArea.disabled = true;
  searchInput.disabled = true;

  // 🔥 โหลดจาก cache ก่อน
  if (!forceRefresh) {
    const cache = localStorage.getItem(CACHE_KEY);
    if (cache) {
      const data = JSON.parse(cache);
      setupData(data);

      loadStatus.innerHTML = `โหลดจาก Cache (${data.length} รายการ)`;
      cardLoadStatus.textContent = `✅ โหลดการ์ดจาก Cache ${data.length} รายการ`;
      return;
    }
  }

  // 🔥 โหลดจาก API
  fetch('https://script.google.com/macros/s/AKfycbzUF01t22A1XpRTwfd-MnG3vRfnA-TZdB-PNZlTzsmA_-7n612vQga9g_R2dlzoZtyT/exec')
    .then(res => res.json())
    .then(data => {

      if (Array.isArray(data)) {

        localStorage.setItem(CACHE_KEY, JSON.stringify(data));

        setupData(data);

        loadStatus.innerHTML = `โหลดจาก API (${data.length} รายการ)`;
        cardLoadStatus.textContent = `✅ โหลดการ์ดสำเร็จ ${data.length} รายการ`;

      } else {
        loadStatus.textContent = 'ไม่พบข้อมูล';
      }

    })
    .catch(err => {
      console.error(err);
      loadStatus.textContent = 'โหลด API ไม่สำเร็จ';
    });
}

    loadDataFromAPI();
  </script>
